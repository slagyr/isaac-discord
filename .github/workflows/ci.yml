name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
      ISAAC_GIT: "1"
    steps:
      - name: Check out isaac-discord
        uses: actions/checkout@v4
        with:
          path: isaac-discord

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          bb: latest
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            ~/.clojure
            isaac-discord/.cpcache
          key: ${{ runner.os }}-clojure-discord-${{ hashFiles('isaac-discord/deps.edn', 'isaac-discord/bb.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-discord-

      - name: Warm dependency classpaths
        working-directory: isaac-discord
        run: |
          clojure -P -M:spec
          clojure -P -M:features

      - name: Run CI (specs + features)
        working-directory: isaac-discord
        run: bb ci