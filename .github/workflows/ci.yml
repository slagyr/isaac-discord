name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    steps:
      - name: Check out isaac-discord
        uses: actions/checkout@v4
        with:
          path: isaac-discord

      - name: Check out split-module siblings
        uses: actions/checkout@v4
        with:
          repository: slagyr/isaac-foundation
          ref: v0.1.0
          path: isaac-foundation

      - uses: actions/checkout@v4
        with:
          repository: slagyr/isaac-agent
          ref: 077d087169cb02b37a7434b30de73d29129a7769
          path: isaac-agent

      - uses: actions/checkout@v4
        with:
          repository: slagyr/isaac-server
          ref: faab82691202521c7312b7e9786620a8c4f02d88
          path: isaac-server

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          bb: latest
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            ~/.clojure
            isaac-discord/.cpcache
            isaac-foundation/.cpcache
            isaac-agent/.cpcache
            isaac-server/.cpcache
          key: ${{ runner.os }}-clojure-discord-${{ hashFiles('isaac-discord/deps.edn', 'isaac-discord/bb.edn', 'isaac-foundation/deps.edn', 'isaac-agent/deps.edn', 'isaac-server/deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-discord-

      - name: Warm dependency classpaths
        working-directory: isaac-discord
        run: |
          clojure -A:dev-local:spec -e "(+ 1 2)" >/dev/null
          clojure -A:dev-local:features -e "(+ 1 2)" >/dev/null

      - name: Run CI (specs + features)
        working-directory: isaac-discord
        run: bb ci